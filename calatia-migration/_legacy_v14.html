function QuestsPanel({ gs }) {
  const active = Object.entries(gs.activeQuests || {});
  const done = gs.doneQuests || [];

  return (
    <>
      <div className="drawer-section">
        <div className="drawer-section-title">─── 进行中 ({active.length}) ───</div>
        {active.length === 0 ? (
          <div className="drawer-empty">尚未接取任务</div>
        ) : (
          <div className="quest-list-drawer">
            {active.map(([qid, currentStep]) => {
              const q = QUESTS[qid];
              if (!q) return null;
              const curIdx = q.steps.findIndex(s => s.id === currentStep);
              return (
                <div key={qid} className="quest-row-drawer">
                  <div className="quest-row-drawer-name">📍 {q.name}</div>
                  <div className="quest-row-drawer-prog">
                    {q.steps.map((s, i) => {
                      if (s.id === 'done') return null;
                      const isDone = i < curIdx;
                      const isCurrent = i === curIdx;
                      return (
                        <div key={s.id} className={`quest-step ${isDone?'done':''} ${isCurrent?'current':''}`}>
                          <span className="quest-step-marker">{isDone ? '✓' : isCurrent ? '▶' : '○'}</span>
                          {s.desc}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {done.length > 0 && (
        <div className="drawer-section">
          <div className="drawer-section-title">─── 已完成 ({done.length}) ───</div>
          <div className="quest-list-drawer">
            {done.map(qid => {
              const q = QUESTS[qid];
              if (!q) return null;
              return (
                <div key={qid} className="quest-row-drawer done">
                  <div className="quest-row-drawer-name">✓ {q.name}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </>
  );
}

function DiceOverlay({ state, onConfirm }) {
  const STAT_INFO = {
    STR: {icon:'⚔️', name:'力量'},
    AGI: {icon:'💨', name:'敏捷'},
    INT: {icon:'✨', name:'智力'},
    CHA: {icon:'💛', name:'魅力'},
    VIT: {icon:'💚', name:'体力'},
    LCK: {icon:'🔮', name:'幸运'},
  };
  const info = STAT_INFO[state.stat] || {icon:'🎲', name:state.stat};

  let verdict = '';
  let verdictClass = '';
  if (!state.rolling && state.roll != null) {
    if (state.isCrit) { verdict = '✦ 大成功！'; verdictClass = 'crit'; }
    else if (state.isFumble) { verdict = '✕ 大失败...'; verdictClass = 'fumble'; }
    else if (state.success) { verdict = '✓ 成功'; verdictClass = 'success'; }
    else { verdict = '✕ 失败'; verdictClass = 'fail'; }
  }

  return (
    <div className="dice-overlay">
      <div className="dice-attr-label">{info.icon} {info.name} 判定</div>
      <div className="dice-rate-info">成功率 {state.rate.toFixed(1)}%</div>
      <div className={`d20-dice ${state.rolling?'rolling':''}`}>
        <div className="d20-shape">
          <div className="d20-num">{state.roll || '?'}</div>
        </div>
      </div>
      <div className={`dice-verdict ${verdictClass}`}>{verdict}</div>
      <button className="dice-cont-btn" onClick={onConfirm} disabled={state.rolling}>
        {state.rolling ? '掷骰中...' : '继续'}
      </button>
    </div>
  );
}

function QuestLog({ gs, onClose }) {
  const active = Object.entries(gs.activeQuests);
  const done = gs.doneQuests || [];
  return (
    <div className="quest-log" onClick={onClose}>
      <div className="ql-box" onClick={e=>e.stopPropagation()}>
        <div className="ql-title">📜 任务</div>
        {active.length === 0 && done.length === 0 && (
          <div className="ql-empty">尚无任务</div>
        )}
        {active.map(([qid, step]) => {
          const q = QUESTS[qid];
          if (!q) return null;
          const stepDef = q.steps.find(s=>s.id===step);
          return (
            <div key={qid} className="ql-item">
              <div className="ql-item-name">{q.name}</div>
              <div className="ql-item-prog">📍 {stepDef?.desc || step}</div>

          );
        })}
        {done.map(qid => {
          const q = QUESTS[qid];
          if (!q) return null;
          return (
            <div key={qid} className="ql-item done">
              <div className="ql-item-name">{q.name}</div>
              <div className="ql-item-prog">✓ 已完成</div>
            </div>
          );
        })}
        <button className="ql-close" onClick={onClose}>关闭</button>
      </div>
    </div>
  );
}

    expression: 'calm',
  });
  const [stats, setStats] = React.useState({ STR:5, AGI:5, INT:5, CHA:5, VIT:5, LCK:5 });
  const [points, setPoints] = React.useState(10);
  const [selTraits, setSelTraits] = React.useState([]);
  const [selGoal, setSelGoal] = React.useState(null);
  const [bottomTab, setBottomTab] = React.useState('appearance'); // appearance | stats | traits

  const STAT_META = [
    { key:'STR', name:'力量', icon:'⚔️' },
    { key:'AGI', name:'敏捷', icon:'💨' },
    { key:'INT', name:'智力', icon:'✨' },
    { key:'CHA', name:'魅力', icon:'💛' },
    { key:'VIT', name:'体力', icon:'💚' },
    { key:'LCK', name:'幸运', icon:'🔮' },
  ];

  const adj = (k, d) => {
    if (d>0 && points<=0) return;
    if (d<0 && stats[k]<=1) return;
    setStats(s => ({...s, [k]: s[k]+d}));
    setPoints(p => p-d);
  };

  const toggleTrait = (id) => {
    if (selTraits.includes(id)) {
      setSelTraits(selTraits.filter(t=>t!==id));
    } else {
      if (selTraits.length >= 2) return;
      setSelTraits([...selTraits, id]);
    }
  };

  // Cycle through option arrays
  const cyclePart = (partKey, dir) => {
    const opts = window.GAMEDATA.FACE_PARTS[partKey].options;
    const cur = face[partKey];
    const idx = opts.findIndex(o => o.id === cur);
    const newIdx = (idx + dir + opts.length) % opts.length;
    setFace(f => ({...f, [partKey]: opts[newIdx].id}));
  };

  // Random face
  const randomize = () => {
    const newFace = {};
    Object.keys(window.GAMEDATA.FACE_PARTS).forEach(k => {
      const opts = window.GAMEDATA.FACE_PARTS[k].options;
      newFace[k] = opts[Math.floor(Math.random()*opts.length)].id;
    });
    setFace(newFace);
  };

  const step1Valid = name.trim() && selTraits.length === 2 && points === 0;
  const step2Valid = !!selGoal;

  const begin = () => {
    if (!step1Valid || !step2Valid) return;
    const ng = makeInitState();
    ng.name = name.trim();
    ng.face = {...face};
    ng.stats = {...stats};
    ng.traits = [...selTraits];
    ng.goal = selGoal;
    selTraits.forEach(tid => {
      const t = TRAITS.find(x => x.id === tid);
      if (t) t.apply(ng);
    });
    ng.maxHp = 25 + ng.stats.VIT * 3 + ng.hpBonus;
    ng.hp = ng.maxHp;
    onStart(ng);
  };

  // Get current part option name for display
  const partLabel = (partKey) => {
    const part = window.GAMEDATA.FACE_PARTS[partKey];
    const opt = part.options.find(o => o.id === face[partKey]);
    return opt ? opt.name : '';
  };

  return (
    <div className="create-screen">
      <div className="create-header">
        <div className="create-title">
          {step === 1 ? '⚔ 创建冒险者' : '✦ 你的命题'}
        </div>
        <div className="create-subtitle">
          {step === 1 ? 'WHO ARE YOU' : 'YOUR DESTINY'}
        </div>
        <div className="create-step-bar">
          <span className={`step-dot ${step>=1?'on':''} ${step===1?'current':''}`}>① 角色</span>
          <span className="step-dash"/>
          <span className={`step-dot ${step>=2?'on':''} ${step===2?'current':''}`}>② 命题</span>
        </div>
      </div>

      {step === 1 && (
        <>
          {/* Big face preview */}
          <div className="face-preview-area">
            <div className="face-preview-frame">
              <FaceAvatar face={face} size={150} />
              <button className="dice-shuffle" onClick={randomize} title="随机">🎲</button>
            </div>
            <input className="face-name-input" value={name} maxLength={10}
              onChange={e=>setName(e.target.value)} placeholder="你的名字..." />
          </div>

          {/* Bottom tabbed area */}
          <div className="create-tabs">
            <button className={`create-tab ${bottomTab==='appearance'?'active':''}`}
              onClick={()=>setBottomTab('appearance')}>外貌</button>
            <button className={`create-tab ${bottomTab==='stats'?'active':''}`}
              onClick={()=>setBottomTab('stats')}>属性 {points>0 && <span className="tab-dot">●</span>}</button>
            <button className={`create-tab ${bottomTab==='traits'?'active':''}`}
              onClick={()=>setBottomTab('traits')}>特性 {selTraits.length<2 && <span className="tab-dot">●</span>}</button>
          </div>

          <div className="create-tab-body">
            {bottomTab === 'appearance' && (
              <div className="part-cyclers">
                {Object.entries(window.GAMEDATA.FACE_PARTS).map(([key, part]) => {
                  const opt = part.options.find(o => o.id === face[key]);
                  return (
                    <div key={key} className="part-cycler">
                      <button className="cycler-arrow" onClick={()=>cyclePart(key, -1)}>◀</button>
                      <div className="cycler-content">
                        <div className="cycler-label">{part.label}</div>
                        <div className="cycler-value">
                          {opt?.color && <span className="color-swatch" style={{background:opt.color}}/>}
                          {opt?.name}
                        </div>
                      </div>
                      <button className="cycler-arrow" onClick={()=>cyclePart(key, 1)}>▶</button>
                    </div>
                  );
                })}
              </div>
            )}

            {bottomTab === 'stats' && (
              <div className="tab-content-stats">
                <div className="pts-bar">剩余点数 <span className="pts-num">{points}</span> / 10</div>
                <div className="stat-grid">
                  {STAT_META.map(s => (
                    <div key={s.key} className="stat-row">
                      <span className="stat-row-icon">{s.icon}</span>
                      <span className="stat-row-name">{s.name}</span>
                      <button className="stat-btn" onClick={()=>adj(s.key,-1)} disabled={stats[s.key]<=1}>−</button>
                      <span className="stat-row-val">{stats[s.key]}</span>
                      <button className="stat-btn" onClick={()=>adj(s.key,1)} disabled={points<=0}>+</button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {bottomTab === 'traits' && (
              <div className="tab-content-traits">
                <div className="trait-hint">选择 2 个特性 · 已选 {selTraits.length}/2</div>
                <div className="trait-grid">
                  {TRAITS.map(t => {
                    const sel = selTraits.includes(t.id);
                    const dis = !sel && selTraits.length >= 2;
                    return (
                      <div key={t.id}
                        className={`trait-card ${sel?'selected':''} ${dis?'disabled':''}`}
                        onClick={()=>toggleTrait(t.id)}>
                        <div className="trait-name">{sel?'✓ ':''}{t.name}</div>
                        <div className="trait-desc">{t.desc}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        </>
      )}

      {step === 2 && (
        <div className="create-body">
          <div style={{padding:'8px 4px 16px',textAlign:'center',color:'var(--text2)',fontSize:'0.85rem',lineHeight:1.7}}>
            这是你为自己设下的命题。<br/>
            它将决定这一段冒险的方向，与最终的归宿。
          </div>
          <div className="goal-list">
            {GOALS.map(g => (
              <div key={g.id}
                className={`goal-card big ${selGoal===g.id?'selected':''}`}
                onClick={()=>setSelGoal(g.id)}>
                <div className="goal-card-top">
                  <div className="goal-icon big">{g.icon}</div>
                  <div className="goal-card-title">
                    <div className="goal-name">{g.name}</div>
                    <div className="goal-desc">{g.desc}</div>
                  </div>
                </div>
                {g.id === 'glory' && (
                  <div className="goal-quote">「让吟游诗人为你写下传记。」</div>
                )}
                {g.id === 'wealth' && (
                  <div className="goal-quote">「金币不会撒谎，它只会让人微笑。」</div>
                )}
                {g.id === 'dragon' && (
                  <div className="goal-quote">「真正的勇者，从不向命运低头。」</div>
                )}
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="create-footer">
        {step === 1 && (
          <button className="start-btn" disabled={!step1Valid} onClick={()=>setStep(2)}>
            下 一 步 →
          </button>
        )}
        {step === 2 && (
          <>
            <button className="back-step-btn" onClick={()=>setStep(1)}>← 返回</button>
            <button className="start-btn primary-btn" disabled={!step2Valid} onClick={begin}>
              踏 上 旅 途 →
            </button>
          </>
        )}
      </div>
    </div>
  );
}

function IntroScreen({ gs, onContinue }) {
  const goal = GOALS.find(g => g.id === gs.goal);
  const primaryTrait = gs.traits.length > 0
    ? TRAITS.find(t => t.id === gs.traits[0])
    : null;
  const secondaryTrait = gs.traits.length > 1
    ? TRAITS.find(t => t.id === gs.traits[1])
    : null;

  return (
    <div className="intro-screen">
      <div className="intro-header">
        <div className="intro-avatar" style={{padding:0,border:'2px solid rgba(30,20,10,0.4)'}}>
          {gs.face ? <FaceAvatar face={gs.face} size={52} /> : '🧙'}
        </div>
        <div>
          <div className="intro-name">{gs.name}</div>
          <div className="intro-trait">
            {primaryTrait?.name}{secondaryTrait?` · ${secondaryTrait.name}`:''}
          </div>
        </div>
      </div>
      <div className="intro-body">
        <div className="intro-chapter">序 章</div>
        <div className="intro-title">命途的开始</div>

        {primaryTrait?.intro && (
          <div className="intro-text">{primaryTrait.intro}</div>
        )}
        {secondaryTrait?.intro && (
          <div className="intro-text">{secondaryTrait.intro}</div>
        )}

        <div className="intro-text">
          某天清晨，你收拾好简单的行装，告别熟悉的一切，向着未知的远方迈出了第一步。前方等待你的，会是命运的眷顾，还是无情的玩笑？
        </div>

        {goal && (
          <div className="intro-goal-box">
            <div className="intro-goal-label">─── 你的命题 ───</div>
            <div className="intro-goal-name">{goal.icon} {goal.name}</div>
            <div className="intro-goal-desc">{goal.desc}</div>
          </div>
        )}
      </div>
      <div className="intro-btn-row">
        <button className="intro-btn" onClick={onContinue}>开 始 旅 程 →</button>
      </div>
    </div>
  );
}

function EndingScreen({ ep, gs, onRestart, onTitle }) {
  return (
    <div className="ending-screen" style={{background: ep.bg ? `radial-gradient(ellipse at top, ${ep.bg}, var(--bg-dark))` : undefined}}>
      <div className="ending-icon">{ep.icon}</div>
      <div className="ending-subtitle">{ep.subtitle || 'EPILOGUE'}</div>
      <div className="ending-title">{ep.title}</div>
      <div className="ending-story">{ep.story}</div>
      <div className="ending-stats">
        <div className="ending-stat">
          <div className="ending-stat-val">{gs.gold}</div>
          <div className="ending-stat-key">金币</div>
        </div>
        <div className="ending-stat">
          <div className="ending-stat-val">{gs.fame}</div>
          <div className="ending-stat-key">声望</div>
        </div>
        <div className="ending-stat">
          <div className="ending-stat-val">{gs.kills||0}</div>
          <div className="ending-stat-key">击杀</div>
        </div>
        <div className="ending-stat">
          <div className="ending-stat-val">{gs.doneQuests?.length||0}</div>
          <div className="ending-stat-key">任务</div>
        </div>
        <div className="ending-stat">
          <div className="ending-stat-val">{gs.exp}</div>
          <div className="ending-stat-key">经验</div>
        </div>
        <div className="ending-stat">
          <div className="ending-stat-val">{gs.questItems?.length||0}</div>
          <div className="ending-stat-key">珍宝</div>
        </div>
      </div>
      <div>
        <button className="ending-btn primary" onClick={onRestart}>再次冒险</button>
        <button className="ending-btn" onClick={onTitle}>返回主页</button>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
